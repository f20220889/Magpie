name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # The unit suite is fully mocked (no Ollama / network / ML model), so we
      # install only the light deps it imports — keeps CI fast (no torch).
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff pydantic pydantic-settings fastapi httpx typer rich trafilatura sqlalchemy

      - name: Lint
        run: ruff check magpie tests

      - name: Run tests
        run: pytest -q
